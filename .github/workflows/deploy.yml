name: Deploy OTONOM (Nuxt) → PlanetHoster N0C

# À chaque push sur main : build de l'app Nuxt, puis envoi FTP du dossier compilé
# (.output) vers l'application Node N0C, et redémarrage (Passenger via tmp/restart.txt).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-otonom
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (.output autonome)
        run: npm run build

      - name: Préparer le dossier à envoyer
        run: |
          rm -rf deploy && mkdir -p deploy/tmp
          cp -r .output deploy/.output
          cp app.js deploy/app.js
          # package.json minimal (métadonnées + démarrage) pour l'app Node
          printf '{\n  "type": "module",\n  "scripts": { "start": "node app.js" }\n}\n' > deploy/package.json
          # déclenche le redémarrage Passenger (contenu qui change à chaque déploiement)
          echo "restart ${{ github.sha }} ${{ github.run_id }}" > deploy/tmp/restart.txt

      - name: Envoi FTP vers l'app Node
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          # Racine de l'application Node sur le serveur (défini en variable de repo FTP_APP_DIR).
          # Exemple : ./nodeapps/otonom/  — À ADAPTER à ton app N0C.
          server-dir: ${{ vars.FTP_APP_DIR || './otonom/' }}
          local-dir: ./deploy/
          exclude: |
            **/.git*
            **/.git*/**
